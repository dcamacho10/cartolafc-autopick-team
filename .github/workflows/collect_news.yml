name: Daily News Collector

on:
  # Runs every day at 08:00 UTC (05:00 Brasilia time / BRT)
  schedule:
    - cron: '0 8 * * *'
  # Also allows manual trigger from the GitHub Actions UI
  workflow_dispatch:

permissions:
  contents: write  # needed to commit the updated SQLite DB back to the repo

jobs:
  collect-news:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use a token so the auto-commit step can push back
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium browser
        run: python -m playwright install chromium --with-deps

      - name: Run news collector
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python main.py collect

      - name: Commit updated news database
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add cartola_autopick/cartola_cache.db
          # Only commit if the DB actually changed
          git diff --staged --quiet || git commit -m "chore: daily news collection $(date -u '+%Y-%m-%d %H:%M UTC')"

      - name: Push changes
        run: git push
