name: Pre-close Auto Pipeline

on:
  # Runs every hour; command itself only executes in the 1h pre-close window.
  schedule:
    - cron: '0 * * * *'
  # Also allows manual trigger from the GitHub Actions UI
  workflow_dispatch:

jobs:
  preclose-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium browser
        run: python -m playwright install chromium --with-deps

      - name: Run pre-close collect + analysis + email
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python main.py auto-preclose --strategy points --budget 140.00 --formation 4-3-3 --days 3 --window-minutes 60

